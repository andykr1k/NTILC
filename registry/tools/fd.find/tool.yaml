id: fd.find
display_name: fd Find
description: Locate files and directories quickly using expressive name and path filters.
interface_type: cli
source_repo: https://github.com/sharkdp/fd
homepage: https://github.com/sharkdp/fd
license: MIT OR Apache-2.0
maintainers:
  - open-tool-embedding
parent_category: filesystem.search
tags:
  - search
  - filesystem
  - files
  - glob
parameters:
  type: object
  properties:
    pattern:
      type: string
      description: File or directory name pattern to match.
    path:
      type: string
      description: Root path to search from.
    file_type:
      type: string
      description: Filter to files, directories, symlinks, or executables.
    hidden:
      type: boolean
      description: Whether hidden paths should be included.
  required:
    - pattern
